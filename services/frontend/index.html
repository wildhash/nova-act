<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Clerk — Operator Console</title>
  <style>
    /* ── Reset & base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #0a0c10;
      --surface:   #111418;
      --surface2:  #181c22;
      --border:    #22282f;
      --accent:    #00d4ff;
      --accent2:   #7b5cf7;
      --green:     #00e676;
      --red:       #ff4444;
      --yellow:    #ffd740;
      --text:      #e0e6ee;
      --text-dim:  #6b7583;
      --radius:    10px;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 15px; line-height: 1.5; }

    /* ── Layout ───────────────────────────────────────────────────── */
    #app { display: grid; grid-template-rows: auto 1fr auto; height: 100%; max-width: 900px; margin: 0 auto; padding: 0 16px; }
    header { padding: 18px 0 10px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); }
    .logo { font-size: 1.25rem; font-weight: 700; letter-spacing: 0.04em; color: var(--accent); }
    .logo span { color: var(--text-dim); font-weight: 400; }
    main { overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 18px; }
    footer { padding: 14px 0 18px; border-top: 1px solid var(--border); }

    /* ── Card ─────────────────────────────────────────────────────── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
    .card-title { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim); margin-bottom: 12px; }

    /* ── Voice controls ───────────────────────────────────────────── */
    .voice-bar { display: flex; align-items: center; gap: 16px; }
    .mic-btn {
      width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer;
      background: var(--surface2); border: 2px solid var(--border); color: var(--text-dim);
      font-size: 1.6rem; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0; position: relative;
    }
    .mic-btn:hover { border-color: var(--accent); color: var(--accent); }
    .mic-btn.listening { border-color: var(--green); color: var(--green); background: rgba(0,230,118,0.08); }
    .mic-btn.thinking  { border-color: var(--yellow); color: var(--yellow); background: rgba(255,215,64,0.08); }
    .mic-btn.speaking  { border-color: var(--accent2); color: var(--accent2); background: rgba(123,92,247,0.08); }
    .mic-btn.error     { border-color: var(--red); color: var(--red); }

    /* Ripple / pulse animation while listening */
    .mic-btn.listening::before {
      content: ''; position: absolute; inset: -6px; border-radius: 50%;
      border: 2px solid var(--green); opacity: 0;
      animation: ripple 1.4s ease-out infinite;
    }
    @keyframes ripple {
      0%   { transform: scale(1);   opacity: 0.7; }
      100% { transform: scale(1.6); opacity: 0;   }
    }

    /* ── State pill ───────────────────────────────────────────────── */
    .state-pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 5px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
      border: 1px solid var(--border); background: var(--surface2);
      text-transform: capitalize; letter-spacing: 0.04em;
    }
    .state-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); }
    .state-pill.idle      .state-dot { background: var(--text-dim); }
    .state-pill.listening .state-dot { background: var(--green);  animation: blink 0.8s infinite; }
    .state-pill.thinking  .state-dot { background: var(--yellow); animation: blink 1.2s infinite; }
    .state-pill.speaking  .state-dot { background: var(--accent2); }
    .state-pill.error     .state-dot { background: var(--red); }
    @keyframes blink { 50% { opacity: 0.2; } }

    .stop-btn {
      margin-left: auto; padding: 8px 22px; border-radius: 8px;
      border: none; background: var(--red); color: #fff; font-size: 0.85rem;
      font-weight: 700; cursor: pointer; letter-spacing: 0.04em;
      display: none;
    }
    .stop-btn.visible { display: block; }
    .stop-btn:hover { background: #ff6666; }

    /* ── Mode selector ────────────────────────────────────────────── */
    .mode-row { display: flex; gap: 8px; align-items: center; }
    .mode-label { font-size: 0.78rem; color: var(--text-dim); margin-right: 6px; }
    .mode-btn {
      padding: 4px 14px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text-dim); font-size: 0.78rem;
      cursor: pointer; transition: all 0.15s;
    }
    .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.07); }

    /* ── Waveform ─────────────────────────────────────────────────── */
    #waveform { display: flex; align-items: center; gap: 3px; height: 40px; }
    .wave-bar {
      width: 4px; border-radius: 2px; background: var(--green);
      animation: wave 0.8s ease-in-out infinite;
    }
    .wave-bar:nth-child(1)  { animation-delay: 0.0s; }
    .wave-bar:nth-child(2)  { animation-delay: 0.1s; }
    .wave-bar:nth-child(3)  { animation-delay: 0.2s; }
    .wave-bar:nth-child(4)  { animation-delay: 0.3s; }
    .wave-bar:nth-child(5)  { animation-delay: 0.4s; }
    .wave-bar:nth-child(6)  { animation-delay: 0.3s; }
    .wave-bar:nth-child(7)  { animation-delay: 0.2s; }
    .wave-bar:nth-child(8)  { animation-delay: 0.1s; }
    @keyframes wave {
      0%, 100% { height: 6px;  }
      50%       { height: 32px; }
    }
    #waveform { display: none; }
    #waveform.visible { display: flex; }

    /* ── Transcript ───────────────────────────────────────────────── */
    #transcript-text {
      min-height: 48px; font-size: 1.05rem; line-height: 1.6;
      color: var(--text-dim);
    }
    #transcript-text.partial { color: var(--text); opacity: 0.6; }
    #transcript-text.final   { color: var(--text); opacity: 1; font-style: normal; }

    #assistant-text {
      min-height: 0; font-size: 0.95rem; line-height: 1.6;
      color: var(--accent2); margin-top: 10px; display: none;
    }
    #assistant-text.visible { display: block; }

    /* ── Timeline ─────────────────────────────────────────────────── */
    #timeline { display: flex; flex-direction: column; gap: 0; }
    .tl-entry {
      padding: 10px 14px; border-left: 2px solid var(--border);
      position: relative; font-size: 0.88rem;
    }
    .tl-entry::before {
      content: ''; position: absolute; left: -5px; top: 14px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--surface2); border: 2px solid var(--border);
    }
    .tl-entry.active::before { border-color: var(--green); background: var(--green); }
    .tl-entry.done::before   { border-color: var(--accent); background: var(--accent); }
    .tl-entry.failed::before { border-color: var(--red); background: var(--red); }
    .tl-step  { color: var(--text-dim); font-size: 0.78rem; margin-bottom: 2px; }
    .tl-text  { color: var(--text); }

    /* ── Receipts ─────────────────────────────────────────────────── */
    #receipts-list { display: flex; flex-direction: column; gap: 8px; }
    .receipt-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px; font-size: 0.82rem;
    }
    .receipt-field { display: flex; gap: 8px; margin-bottom: 3px; }
    .receipt-key { color: var(--text-dim); min-width: 120px; }
    .receipt-val { color: var(--text); word-break: break-all; }

    /* ── Empty states ─────────────────────────────────────────────── */
    .empty { color: var(--text-dim); font-size: 0.85rem; padding: 6px 0; }

    /* ── Error toast ──────────────────────────────────────────────── */
    #error-toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #2d1a1a; border: 1px solid var(--red);
      border-radius: 8px; padding: 12px 18px;
      color: var(--red); font-size: 0.85rem; max-width: 320px;
      display: none; z-index: 9999;
    }
    #error-toast.visible { display: block; }
  </style>
</head>
<body>
<div id="app">

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header>
    <div class="logo">Nova Clerk <span>/ operator console</span></div>
    <div class="mode-row" style="margin-left:auto">
      <span class="mode-label">Mode:</span>
      <button class="mode-btn active" id="btn-mock" onclick="setMode('mock')">Mock</button>
      <button class="mode-btn"        id="btn-real" onclick="setMode('real')">Real</button>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────────── -->
  <main>

    <!-- Voice control card -->
    <div class="card">
      <div class="card-title">Voice Input</div>
      <div class="voice-bar">
        <button class="mic-btn" id="mic-btn" onclick="toggleVoice()" title="Click to speak">🎤</button>
        <div>
          <div class="state-pill idle" id="state-pill">
            <div class="state-dot"></div>
            <span id="state-label">idle</span>
          </div>
          <div id="waveform">
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
            <div class="wave-bar"></div><div class="wave-bar"></div>
          </div>
        </div>
        <button class="stop-btn" id="stop-btn" onclick="stopVoice()">■ STOP</button>
      </div>
    </div>

    <!-- Transcript card -->
    <div class="card">
      <div class="card-title">Transcript</div>
      <div id="transcript-text" class="empty">Waiting for voice input…</div>
      <div id="assistant-text"></div>
    </div>

    <!-- Timeline card -->
    <div class="card">
      <div class="card-title">Run Timeline</div>
      <div id="timeline"><p class="empty">No runs yet.</p></div>
    </div>

    <!-- Receipts card -->
    <div class="card">
      <div class="card-title">Receipts</div>
      <div id="receipts-list"><p class="empty">No receipts yet.</p></div>
    </div>

  </main>

  <footer>
    <div style="font-size:0.75rem; color:var(--text-dim)">
      Nova Clerk · Powered by Amazon Nova 2 Sonic + Nova 2 Lite
    </div>
  </footer>
</div>

<!-- ── Error toast ─────────────────────────────────────────────── -->
<div id="error-toast"></div>

<script>
/* ────────────────────────────────────────────────────────────────
   Nova Clerk — Operator Console JS
   ──────────────────────────────────────────────────────────────── */

const API_BASE = window.location.origin;
const WS_BASE  = API_BASE.replace(/^http/, 'ws');

// ── State ──────────────────────────────────────────────────────
let mode          = 'mock';     // 'mock' | 'real'
let voiceState    = 'idle';     // idle | listening | thinking | speaking | error
let sessionId     = null;
let ws            = null;
let mediaStream   = null;
let audioCtx      = null;
let audioProc     = null;
let currentRunId  = null;

// ── Mode selector ──────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btn-mock').classList.toggle('active', m === 'mock');
  document.getElementById('btn-real').classList.toggle('active', m === 'real');
}

// ── Voice state UI ─────────────────────────────────────────────
function setVoiceState(state) {
  voiceState = state;
  const pill  = document.getElementById('state-pill');
  const label = document.getElementById('state-label');
  const mic   = document.getElementById('mic-btn');
  const wave  = document.getElementById('waveform');
  const stop  = document.getElementById('stop-btn');

  ['idle','listening','thinking','speaking','error'].forEach(s => {
    pill.classList.remove(s);
    mic.classList.remove(s);
  });
  pill.classList.add(state);
  mic.classList.add(state);
  label.textContent = state;

  wave.classList.toggle('visible', state === 'listening');
  stop.classList.toggle('visible', state !== 'idle' && state !== 'error');

  // Emoji icons
  const icons = { idle:'🎤', listening:'🔴', thinking:'🔄', speaking:'🔊', error:'⚠️' };
  mic.textContent = icons[state] || '🎤';
}

// ── Transcript ─────────────────────────────────────────────────
function setTranscript(text, isFinal) {
  const el = document.getElementById('transcript-text');
  el.textContent = text;
  el.className = isFinal ? 'final' : 'partial';
}

function setAssistantText(text) {
  const el = document.getElementById('assistant-text');
  el.textContent = text;
  el.classList.add('visible');
  // Speak it aloud in mock mode using browser TTS
  if (mode === 'mock' && 'speechSynthesis' in window) {
    const utt = new SpeechSynthesisUtterance(text);
    utt.rate = 1.05;
    speechSynthesis.speak(utt);
  }
}

// ── Timeline ───────────────────────────────────────────────────
function addTimelineEntry(step, text, state) {
  const container = document.getElementById('timeline');
  // Remove "no runs" placeholder
  const empty = container.querySelector('.empty');
  if (empty) empty.remove();

  const entry = document.createElement('div');
  entry.className = `tl-entry ${state}`;
  entry.id = `tl-${step}`;
  entry.innerHTML = `<div class="tl-step">Step ${step}</div><div class="tl-text">${text}</div>`;
  container.appendChild(entry);
}

function updateTimelineEntry(step, state) {
  const el = document.getElementById(`tl-${step}`);
  if (el) el.className = `tl-entry ${state}`;
}

let _stepCounter = 0;
function addRunStep(runId, step, text) {
  _stepCounter = step;
  addTimelineEntry(step, text, 'active');
}

function markRunComplete(runId) {
  for (let i = 1; i <= _stepCounter; i++) {
    updateTimelineEntry(i, 'done');
  }
}

function markRunFailed(runId, error) {
  addTimelineEntry(_stepCounter + 1, `Error: ${error}`, 'failed');
}

// ── Receipts ───────────────────────────────────────────────────
function addReceipt(receipt) {
  const container = document.getElementById('receipts-list');
  const empty = container.querySelector('.empty');
  if (empty) empty.remove();

  const card = document.createElement('div');
  card.className = 'receipt-card';
  const fields = [
    ['run_id',           receipt.run_id],
    ['session_id',       receipt.session_id],
    ['mode',             receipt.mode],
    ['transcript',       receipt.transcript_final],
    ['created_at',       receipt.created_at],
  ].filter(([, v]) => v);

  card.innerHTML = fields.map(([k, v]) =>
    `<div class="receipt-field"><span class="receipt-key">${k}</span><span class="receipt-val">${v}</span></div>`
  ).join('');
  container.prepend(card);
}

// ── Error toast ────────────────────────────────────────────────
let _errorTimer;
function showError(msg) {
  const el = document.getElementById('error-toast');
  el.textContent = `⚠ ${msg}`;
  el.classList.add('visible');
  clearTimeout(_errorTimer);
  _errorTimer = setTimeout(() => el.classList.remove('visible'), 6000);
}

// ── WebSocket events ───────────────────────────────────────────
function handleEvent(evt) {
  const data = JSON.parse(evt.data);
  switch (data.type) {
    case 'listening_started':
      setVoiceState('listening');
      setTranscript('Listening…', false);
      break;
    case 'transcript_partial':
      setTranscript(data.text, false);
      break;
    case 'transcript_final':
      setTranscript(data.text, true);
      break;
    case 'thinking':
      setVoiceState('thinking');
      break;
    case 'assistant_text':
      setVoiceState('speaking');
      setAssistantText(data.text);
      break;
    case 'assistant_audio_chunk':
      // Play PCM audio in real mode
      playPcmChunk(data.data);
      break;
    case 'run_started':
      currentRunId = data.run_id;
      _stepCounter = 0;
      addTimelineEntry(0, `Run started — id: ${data.run_id.slice(0, 8)}…`, 'active');
      break;
    case 'run_step':
      addRunStep(data.run_id, data.step, data.text);
      break;
    case 'run_completed':
      markRunComplete(data.run_id);
      if (data.receipts && data.receipts.length) {
        data.receipts.forEach(r => addReceipt(r));
      }
      break;
    case 'run_failed':
      markRunFailed(data.run_id, data.error);
      showError(`Run failed: ${data.error}`);
      break;
    case 'session_stopped':
      setVoiceState('idle');
      stopAudioCapture();
      break;
    case 'error':
      setVoiceState('error');
      showError(data.message);
      stopAudioCapture();
      break;
    default:
      break;
  }
}

// ── PCM audio playback (real mode assistant audio) ─────────────
let _audioQueue = [];
let _audioPlaying = false;
function playPcmChunk(base64Data) {
  if (!audioCtx) audioCtx = new AudioContext({ sampleRate: 24000 });
  const pcm = Uint8Array.from(atob(base64Data), c => c.charCodeAt(0));
  const samples = new Int16Array(pcm.buffer);
  const floats   = new Float32Array(samples.length);
  for (let i = 0; i < samples.length; i++) floats[i] = samples[i] / 32768;
  const buf = audioCtx.createBuffer(1, floats.length, 24000);
  buf.copyToChannel(floats, 0);
  _audioQueue.push(buf);
  if (!_audioPlaying) _drainAudioQueue();
}
function _drainAudioQueue() {
  if (!_audioQueue.length) { _audioPlaying = false; return; }
  _audioPlaying = true;
  const buf = _audioQueue.shift();
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.onended = _drainAudioQueue;
  src.start();
}

// ── Mic capture ────────────────────────────────────────────────
async function startAudioCapture() {
  if (!navigator.mediaDevices) { showError('Microphone not available'); return false; }
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { sampleRate: 16000, channelCount: 1 } });
    audioCtx   = new AudioContext({ sampleRate: 16000 });
    const src  = audioCtx.createMediaStreamSource(mediaStream);
    audioProc  = audioCtx.createScriptProcessor(4096, 1, 1);
    audioProc.onaudioprocess = (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const floats  = e.inputBuffer.getChannelData(0);
      const int16   = new Int16Array(floats.length);
      for (let i = 0; i < floats.length; i++) {
        int16[i] = Math.max(-32768, Math.min(32767, floats[i] * 32768));
      }
      ws.send(int16.buffer);
    };
    src.connect(audioProc);
    audioProc.connect(audioCtx.destination);
    return true;
  } catch (err) {
    showError('Mic permission denied: ' + err.message);
    return false;
  }
}

function stopAudioCapture() {
  if (audioProc) { audioProc.disconnect(); audioProc = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (audioCtx) { audioCtx.close().catch(() => {}); audioCtx = null; }
}

// ── Toggle voice ───────────────────────────────────────────────
async function toggleVoice() {
  if (voiceState !== 'idle' && voiceState !== 'error') {
    stopVoice();
    return;
  }
  // Clear previous run UI
  document.getElementById('transcript-text').textContent = 'Waiting for voice input…';
  document.getElementById('transcript-text').className = 'empty';
  document.getElementById('assistant-text').classList.remove('visible');

  // Create session on backend
  let resp;
  try {
    resp = await fetch(`${API_BASE}/api/voice/session/start`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode }),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  } catch (err) {
    showError('Failed to start session: ' + err.message);
    return;
  }
  const session = await resp.json();
  sessionId = session.session_id;

  // Open WebSocket
  ws = new WebSocket(`${WS_BASE}/api/voice/stream/${sessionId}`);
  ws.binaryType = 'arraybuffer';
  ws.onmessage = handleEvent;
  ws.onerror   = () => { showError('WebSocket error'); setVoiceState('error'); };
  ws.onclose   = () => {
    if (voiceState !== 'idle') setVoiceState('idle');
    stopAudioCapture();
  };

  // Wait for WS open then start mic
  await new Promise((res, rej) => {
    ws.onopen  = res;
    ws.onerror = rej;
  });

  if (mode === 'mock') {
    // In mock mode, send a single dummy frame to kick off the simulation
    ws.send(new Int16Array(1).buffer);
    setVoiceState('listening');
  } else {
    // Real mode: capture actual mic audio
    const ok = await startAudioCapture();
    if (!ok) { ws.close(); return; }
    setVoiceState('listening');
  }
}

// ── Stop voice ─────────────────────────────────────────────────
function stopVoice() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'stop' }));
    setTimeout(() => { if (ws) ws.close(); }, 400);
  }
  stopAudioCapture();
  if (sessionId) {
    fetch(`${API_BASE}/api/voice/session/stop`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: sessionId }),
    }).catch(() => {});
  }
  sessionId = null;
  setVoiceState('idle');
}
</script>
</body>
</html>
